events {
    worker_connections 1024;
}

http {
    upstream identity {
        server identity-service:8001;
    }

    upstream learning {
        server learning-service:8002;
    }

    upstream recommendation {
        server recommendation-service:8003;
    }

    upstream content {
        server content-service:8004;
    }

    server {
        listen 8000;

        # Identity Service Routes
        location /api/v1/auth {
            proxy_pass http://identity;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/profile {
            proxy_pass http://identity;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/onboarding {
            proxy_pass http://identity;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Learning Service Routes
        location /api/v1/sessions {
            proxy_pass http://learning;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/progress {
            proxy_pass http://learning;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/feedback {
            proxy_pass http://learning;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/coach {
            proxy_pass http://learning;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Recommendation Service Routes
        location /api/v1/recommendations {
            proxy_pass http://recommendation;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/roadmap {
            proxy_pass http://recommendation;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/guard {
            proxy_pass http://recommendation;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Content Service Routes
        location /api/v1/search {
            proxy_pass http://content;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
